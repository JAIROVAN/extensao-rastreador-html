<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rastreador HTML</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      padding: 12px;
      width: 236px;
      background: #f7f9fc;
    }

    .popup-actions {
      display: grid;
      gap: 8px;
    }

    button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #155eef;
      color: #ffffff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    button:hover {
      background: #0f49c9;
    }

    button:focus-visible {
      outline: 3px solid #9cc2ff;
      outline-offset: 2px;
    }

    button:disabled {
      background: #8ca2c5;
      cursor: not-allowed;
    }

    #stopButton {
      border: 1px solid #d6a644;
      background: #fff4df;
      color: #6f4700;
    }

    #stopButton:hover {
      background: #ffe9bd;
    }

    #stopButton:disabled {
      border-color: #cad4e2;
      background: #e8edf5;
      color: #77869b;
    }
  </style>
</head>
<body>
  <div class="popup-actions">
    <button id="trackButton" type="button">RASTREAR</button>
    <button id="stopButton" type="button">Interromper rastreamento</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
